<body>
  <style>
    body { margin: 0; background-color: #8B4513; }
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background-color: #8B4513;
      font-family: sans-serif;
    }
    #loading .title {
      color: #fff;
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 0.3rem;
      margin-bottom: 2rem;
    }
    #loading .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <div id="loading">
    <div class="title"><span style="font-size:1.5rem">(an-)</span><br>ALFAPET</div>
    <div class="spinner"></div>
  </div>
  <script>
    // Remove loading indicator once Flutter renders its first frame.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDdsNrnheLnhAe5fPJNkQo86f40DgBdg5I",
      appId: "1:245672555479:web:01dd2824ac0ff9e94e9192",
      messagingSenderId: "245672555479",
      projectId: "fcm-switch",
      authDomain: "fcm-switch.firebaseapp.com",
      storageBucket: "fcm-switch.firebasestorage.app",
    });
    var _analfapetMessaging = firebase.messaging();
    window._analfapetGetToken = function(swReg, vapidKey) {
      return _analfapetMessaging.getToken({ vapidKey: vapidKey, serviceWorkerRegistration: swReg });
    };
    // Listen for foreground messages via compat SDK and forward to Dart callback
    window._analfapetOnMessage = null;
    _analfapetMessaging.onMessage(function(payload) {
      console.log('[SW] Foreground message:', payload);
      if (window._analfapetOnMessage && payload.data) {
        window._analfapetOnMessage(JSON.stringify(payload.data));
      }
    });
    window._analfapetHasBarcodeDetector = function() {
      return true; // always available via canvas fallback
    };
    window._analfapetDetectQR = async function(videoElement) {
      // Try native BarcodeDetector first (Chrome Android)
      if (typeof BarcodeDetector !== 'undefined') {
        try {
          const detector = new BarcodeDetector({formats: ['qr_code']});
          const results = await detector.detect(videoElement);
          if (results.length > 0) return results[0].rawValue;
          return null;
        } catch(e) {}
      }
      // Fallback: capture frame to canvas and use jsQR
      if (!window._jsQR) return null;
      const canvas = document.createElement('canvas');
      canvas.width = videoElement.videoWidth;
      canvas.height = videoElement.videoHeight;
      if (canvas.width === 0 || canvas.height === 0) return null;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = window._jsQR(imageData.data, imageData.width, imageData.height);
      if (code) return code.data;
      return null;
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script>window._jsQR = jsQR;</script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
